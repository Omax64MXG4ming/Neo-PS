<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" sizes="64x64" href="https://neops.x10.mx/icon.png">
<title>Neo PS</title>
<style>
/* RESET */
 *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

/* BACKGROUND */
body{
    background:url("https://neops.x10.mx/bg.png") no-repeat center center;
    background-size:cover;
    background-attachment:fixed;
}
  
  
/* OVERLAYS */
.overlay,.light{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
}

.overlay{
    background:linear-gradient(135deg,#1d4ed8aa,#38bdf866);
    z-index:1;
}

.light{
    background:radial-gradient(circle,rgba(255,255,255,.08),transparent 40%);
    animation:moveLight 10s linear infinite;
    z-index:2;
}

@keyframes moveLight{
    0%{transform:translate(-20%,-20%);}
    50%{transform:translate(10%,10%);}
    100%{transform:translate(-20%,-20%);}
}

/* PARTICLES */
#particles{
    position:fixed;
    width:100vw;
    height:100vh;
    z-index:1;
}
  
  

/* CENTER */
.center{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:100%;
    max-width:1200px;
    z-index:5;
}

  
/* LOGO */
.logo{
    width:min(420px,80vw);
    animation:float 4s ease-in-out infinite, glow 3s ease-in-out infinite;
}

/* TEXT */
.title{
    color:white;
    font-size:2rem;
    margin-top:10px;
}

.subtitle{
    color:rgba(255,255,255,.85);
    font-size:.9rem;
    margin-top:5px;
}

.active{
    color:#a5f3fc;
    margin-top:8px;
    font-size:.85rem;
}

/* BUTTONS */
.buttons{
    margin-top:20px;
}

.btn{
    display:inline-block;
    padding:.8rem 1.4rem;
    margin:6px;
    border-radius:12px;
    color:white;
    text-decoration:none;
    font-weight:bold;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.2);
    backdrop-filter:blur(10px);
    transition:.3s;
}

.btn:hover{
    transform:scale(1.08);
    background:rgba(56,189,248,.35);
}

/* MUSIC */
.music{
    position:fixed;
    top:15px;
    right:15px;
    z-index:10;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.2);
    color:white;
    cursor:pointer;
    backdrop-filter:blur(10px);
}

.music.active{
    background:rgba(56,189,248,.35);
    box-shadow:0 0 20px rgba(56,189,248,.6);
}

.music.spin{
    animation:spin 2s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0);}
    to{transform:rotate(360deg);}
}
</style>
</head>
<body>
  
  

  
  
<div class="overlay"></div>
<div class="light"></div>

<canvas id="particles"></canvas>

<button class="music" onclick="toggleMusic()" id="musicBtn">🎵 Music</button>

<audio id="bgmusic" loop>
    <source src="https://neops.x10.mx/menuLoop.mp3" type="audio/mpeg">
</audio>

<div class="center">

    <img src="https://neops.x10.mx/logo.png" class="logo">

    <div class="title">Neo PS</div>
    <div class="subtitle">Private server, from me to everyone</div>

    <div class="buttons">
        <a href="https://browser.neops.x10.mx/" class="btn">📊 Browser</a>
        <a href="html/" class="btn">📊 Wiki</a>
        <a href="https://github.com/Omax64MXG4ming/Neo-PS/releases" class="btn">📥 Download</a>
        <a href="https://neops.x10.mx/database/dashboard/" class="btn">🔮 Dashboard</a>
    </div>

</div>

<script>

/* MUSIC */
let music=document.getElementById("bgmusic");
let btn=document.getElementById("musicBtn");

function toggleMusic(){

    if(music.paused){
        music.volume=0.4;
        music.play();
        localStorage.setItem("neo_music","on");
        btn.classList.add("active","spin");
        btn.innerHTML="🎵 Playing";
    }else{
        music.pause();
        localStorage.setItem("neo_music","off");
        btn.classList.remove("active","spin");
        btn.innerHTML="🎵 Musica";
    }
}

/* AUTO MUSIC */
window.addEventListener("load",()=>{
    if(localStorage.getItem("neo_music")==="on"){
        music.play().then(()=>{
            btn.classList.add("active","spin");
            btn.innerHTML="🎵 Playing";
        }).catch(()=>{});
    }
});

/* PARTICLES */
const c=document.getElementById("particles");
const x=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let p=[];

for(let i=0;i<60;i++){
    p.push({
        x:Math.random()*c.width,
        y:Math.random()*c.height,
        r:Math.random()*2,
        dx:(Math.random()-0.5),
        dy:(Math.random()-0.5)
    });
}

function draw(){
    x.clearRect(0,0,c.width,c.height);

    x.fillStyle="rgba(255,255,255,.6)";

    for(let i of p){
        x.beginPath();
        x.arc(i.x,i.y,i.r,0,Math.PI*2);
        x.fill();

        i.x+=i.dx;
        i.y+=i.dy;

        if(i.x<0||i.x>c.width)i.dx*=-1;
        if(i.y<0||i.y>c.height)i.dy*=-1;
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
