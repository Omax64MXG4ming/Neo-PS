<script>

/* INTRO REMOVE */
<?php if($showIntro): ?>
setTimeout(()=>{
    const i=document.getElementById("intro");
    if(i) i.remove();
},2800);
<?php endif; ?>

/* MUSIC */
let music=document.getElementById("bgmusic");
let btn=document.getElementById("musicBtn");

function toggleMusic(){

    if(music.paused){
        music.volume=0.4;
        music.play();
        localStorage.setItem("neo_music","on");
        btn.classList.add("active","spin");
        btn.innerHTML="🎵 Playing";
    }else{
        music.pause();
        localStorage.setItem("neo_music","off");
        btn.classList.remove("active","spin");
        btn.innerHTML="🎵 Music";
    }
}

/* AUTO MUSIC */
window.addEventListener("load",()=>{
    if(localStorage.getItem("neo_music")==="on"){
        music.play().then(()=>{
            btn.classList.add("active","spin");
            btn.innerHTML="🎵 Playing";
        }).catch(()=>{});
    }
});

/* PARTICLES */
const c=document.getElementById("particles");
const x=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let p=[];

for(let i=0;i<60;i++){
    p.push({
        x:Math.random()*c.width,
        y:Math.random()*c.height,
        r:Math.random()*2,
        dx:(Math.random()-0.5),
        dy:(Math.random()-0.5)
    });
}

function draw(){
    x.clearRect(0,0,c.width,c.height);

    x.fillStyle="rgba(255,255,255,.6)";

    for(let i of p){
        x.beginPath();
        x.arc(i.x,i.y,i.r,0,Math.PI*2);
        x.fill();

        i.x+=i.dx;
        i.y+=i.dy;

        if(i.x<0||i.x>c.width)i.dx*=-1;
        if(i.y<0||i.y>c.height)i.dy*=-1;
    }

    requestAnimationFrame(draw);
}

draw();

</script>
